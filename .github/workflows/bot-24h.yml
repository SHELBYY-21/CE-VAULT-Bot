# รันบอทเกือบ 24/7 บน GitHub Actions (ไม่ต้องใช้ Vercel)
# วิธีใช้ (เร็วสุด — ไม่ต้องตั้ง Secrets ใน Settings):
# 1) Actions → "Bot 24h" → Run workflow
# 2) วาง BOT_TOKEN + FIREBASE_SERVICE_ACCOUNT_JSON (หนึ่งบรรทัด) ในช่อง input
# 3) Run workflow
#
# หรือตั้งเป็น Repository secrets แล้ว schedule ทุก 5 ชม. จะรันเองหลัง merge เข้า main:
#    - BOT_TOKEN
#    - FIREBASE_SERVICE_ACCOUNT_JSON
#    - GROK_API_KEY (ถ้ามี)
#    - API_SECRET (แนะนำ)
name: Bot 24h

on:
  workflow_dispatch:
    inputs:
      bot_token:
        description: BOT_TOKEN (ใช้เมื่อยังไม่มี Actions secret)
        required: false
        type: string
      firebase_sa_json:
        description: FIREBASE_SERVICE_ACCOUNT_JSON ทั้งก้อน (minify เป็นหนึ่งบรรทัด)
        required: false
        type: string
  schedule:
    # เริ่มรอบใหม่ทุก 5 ชม. (job เก่าถูก cancel → ครอบคลุมเกือบตลอดวัน)
    - cron: '0 */5 * * *'

concurrency:
  group: ce-vault-bot-24h
  cancel-in-progress: true

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: |
          npm ci
          npm ci --prefix bot

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ce88-95911
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAsMPN5vnoFkRmoLPySPV2yqtnO7NDj9WQ
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ce88-95911.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ce88-95911.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '1061212552362'
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:1061212552362:web:178ee63516a172826164d3
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: '0'
        run: npm run build

      - name: Resolve credentials
        id: creds
        env:
          SECRET_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SECRET_FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          INPUT_BOT_TOKEN: ${{ inputs.bot_token }}
          INPUT_FIREBASE_SA: ${{ inputs.firebase_sa_json }}
        run: |
          BOT_TOKEN="${SECRET_BOT_TOKEN:-$INPUT_BOT_TOKEN}"
          FIREBASE_SA="${SECRET_FIREBASE_SA:-$INPUT_FIREBASE_SA}"
          if [ -z "$BOT_TOKEN" ]; then
            echo "Missing BOT_TOKEN (secret หรือ workflow input)"
            exit 1
          fi
          if [ -z "$FIREBASE_SA" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON (secret หรือ workflow input)"
            exit 1
          fi
          # Mask so they do not leak in logs
          echo "::add-mask::$BOT_TOKEN"
          printf '%s' "$FIREBASE_SA" > /tmp/firebase-sa.json
          echo "BOT_TOKEN=$BOT_TOKEN" >> "$GITHUB_ENV"
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json" >> "$GITHUB_ENV"
          echo "FIREBASE_SERVICE_ACCOUNT_JSON<<EOF" >> "$GITHUB_ENV"
          printf '%s\n' "$FIREBASE_SA" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Clear Telegram webhook (use long-poll)
        run: |
          curl -fsS "https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook?drop_pending_updates=true"
          echo
          curl -fsS "https://api.telegram.org/bot${BOT_TOKEN}/getMe"
          echo

      - name: Start Next.js + bot bridge
        env:
          API_SECRET: ${{ secrets.API_SECRET }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.API_SECRET }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ce88-95911
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyAsMPN5vnoFkRmoLPySPV2yqtnO7NDj9WQ
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ce88-95911.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ce88-95911.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '1061212552362'
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:1061212552362:web:178ee63516a172826164d3
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: '0'
          FIREBASE_PROJECT_ID: ce88-95911
          FIREBASE_STORAGE_BUCKET: ce88-95911.firebasestorage.app
          APP_URL: http://127.0.0.1:3000
          LOCAL_WEBHOOK_URL: http://127.0.0.1:3000/api/telegram/webhook
          API_BASE_URL: http://127.0.0.1:3000
        run: |
          set -e
          # Optional OCR key from Actions secret (name: GROK_API_KEY)
          if [[ -n "${{ secrets.GROK_API_KEY }}" ]]; then
            export GROK_API_KEY="${{ secrets.GROK_API_KEY }}"
          fi
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          NEXT_PID=$!
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Next.js healthy"
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000/api/health
          echo
          (cd bot && npx ts-node src/index.ts) &
          BRIDGE_PID=$!
          # Keep job alive until cancelled / timeout; exit if either dies
          while kill -0 "$NEXT_PID" 2>/dev/null && kill -0 "$BRIDGE_PID" 2>/dev/null; do
            sleep 30
          done
          echo "Process exited — failing job so schedule restarts"
          kill "$NEXT_PID" "$BRIDGE_PID" 2>/dev/null || true
          exit 1
